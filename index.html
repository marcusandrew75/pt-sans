  <h2>A HOMAGE TO HIDEO KOJIMA &nbsp;—&nbsp; BUILT IN CLAUDE CODE</h2>
  <p>WASD &nbsp;—&nbsp; move</p>
  <p>MOUSE &nbsp;—&nbsp; look</p>
  <p>HEADPHONES &nbsp;—&nbsp; strongly advised</p>

  "three": "./three-js/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { GTAOPass } from 'three/addons/postprocessing/GTAOPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ============================ RENDERER / SCENE ============================ */

const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
/* grain + darkness hide a lower internal res; the post chain is the budget */
const DPR = Math.min(devicePixelRatio, 1.4);
renderer.setPixelRatio(DPR);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.18;  // post chain (AO + vignette) eats some light
app.appendChild(renderer.domElement);
const MAX_ANISO = renderer.capabilities.getMaxAnisotropy();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x040408);
scene.fog = new THREE.FogExp2(0x040408, 0.082);

const camera = new THREE.PerspectiveCamera(72, innerWidth / innerHeight, 0.05, 60);
camera.rotation.order = 'YXZ';

/* ============================ POST-PROCESSING ============================
   render → GTAO (contact shadows) → bloom → tonemap → grime
   (chromatic aberration + film grain + scanlines + vignette)            */

const GrimeShader = {
  uniforms: {
    tDiffuse: { value: null },
    time: { value: 0 },
    resolution: { value: new THREE.Vector2(innerWidth, innerHeight) },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
  fragmentShader: /* glsl */`
    uniform sampler2D tDiffuse;
    uniform float time;
    uniform vec2 resolution;
    varying vec2 vUv;
    float rand(vec2 co) { return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453); }
    void main() {
      vec2 c = vUv - 0.5;
      float d = length(c);
      vec2 dir = d > 0.0001 ? c / d : vec2(0.0);
      /* chromatic aberration, stronger toward the edges */
      float ca = 0.0028 * smoothstep(0.1, 0.7, d);
      vec3 col;
      col.r = texture2D(tDiffuse, vUv - dir * ca).r;
      col.g = texture2D(tDiffuse, vUv).g;
      col.b = texture2D(tDiffuse, vUv + dir * ca).b;
      /* animated film grain */
      float g = rand(vUv * resolution * 0.75 + vec2(mod(time * 61.7, 89.0), mod(time * 38.3, 71.0)));
      col += (g - 0.5) * 0.06;
      /* faint scanlines */
      col *= 0.97 + 0.03 * sin(vUv.y * resolution.y * 1.5);
      /* vignette */
      col *= 1.0 - 0.78 * smoothstep(0.42, 0.95, d);
      gl_FragColor = vec4(col, 1.0);
    }`,
};

const composer = new EffectComposer(renderer,
  new THREE.WebGLRenderTarget(innerWidth, innerHeight, { type: THREE.HalfFloatType, samples: 2 }));
composer.setPixelRatio(DPR);
composer.setSize(innerWidth, innerHeight);
composer.addPass(new RenderPass(scene, camera));
const gtaoPass = new GTAOPass(scene, camera, innerWidth, innerHeight);
gtaoPass.updateGtaoMaterial({ radius: 0.3, distanceExponent: 1.5, thickness: 1, scale: 1.3, samples: 8 });
gtaoPass.updatePdMaterial({ rings: 2, samples: 8 });   // lighter denoise
composer.addPass(gtaoPass);
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.3, 0.45, 0.85));
composer.addPass(new OutputPass());
const grimePass = new ShaderPass(GrimeShader);
composer.addPass(grimePass);

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  grimePass.uniforms.resolution.value.set(innerWidth, innerHeight);
});

/* ============================ PROCEDURAL TEXTURES ============================ */

function makeTexture(w, h, draw) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  draw(c.getContext('2d'), w, h);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.anisotropy = MAX_ANISO;
  return t;
}

/* damask motif — a small symmetrical curlicue */
function drawMotif(g, x, y, s, style) {
  g.save(); g.translate(x, y); g.scale(s, s); g.strokeStyle = style; g.lineWidth = 1.6;
  g.beginPath(); g.ellipse(0, -4, 2.6, 5, 0, 0, 7); g.stroke();          // bud
  for (const m of [-1, 1]) {                                             // curls
    g.beginPath(); g.moveTo(0, 0);
    g.bezierCurveTo(m * 6, 2, m * 8, 8, m * 3, 11);
    g.stroke();
  }
  g.beginPath(); g.moveTo(0, 1); g.lineTo(0, 13); g.stroke();            // stem
  g.restore();
}

const wallpaperTex = makeTexture(1024, 1024, (g, w, h) => {
  const S = w / 512;
  g.fillStyle = '#56574b'; g.fillRect(0, 0, w, h);        // tired grey-green paint
  for (let i = 0; i < 900 * S; i++) {                     // soft mottling
    g.fillStyle = Math.random() < 0.5
      ? `rgba(106,106,93,${0.02 + Math.random() * 0.04})`
      : `rgba(58,59,50,${0.02 + Math.random() * 0.04})`;
    g.beginPath();
    g.ellipse(Math.random() * w, Math.random() * h,
      (8 + Math.random() * 40) * S, (6 + Math.random() * 30) * S,
      Math.random() * 3, 0, 7);
    g.fill();
  }
  for (let i = 0; i < 70 * S; i++) {                      // faint vertical streaking
    g.fillStyle = `rgba(30,30,24,${0.015 + Math.random() * 0.03})`;
    g.fillRect(Math.random() * w, 0, (1.5 + Math.random() * 4) * S, h);
  }
  for (let i = 0; i < 10; i++) {                          // larger damp stains
    const x = Math.random() * w, y = Math.random() * h, r = (40 + Math.random() * 90) * S;
    const sg = g.createRadialGradient(x, y, r * 0.2, x, y, r);
    sg.addColorStop(0, 'rgba(40,40,32,0.10)'); sg.addColorStop(1, 'rgba(40,40,32,0)');
    g.fillStyle = sg; g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
  }
  for (let i = 0; i < 260 * S * S; i++) {                 // speckle
    g.fillStyle = `rgba(${Math.random() < 0.5 ? '20,20,16' : '150,150,135'},${Math.random() * 0.05})`;
    g.fillRect(Math.random() * w, Math.random() * h, 2, 2);
  }
});

const floorTex = makeTexture(1024, 1024, (g, w, h) => {
  const S = w / 512;
  g.fillStyle = '#241708'; g.fillRect(0, 0, w, h);
  const pl = 110 * S, pw = 34 * S;                        // herringbone parquet
  for (let j = -2; j < h / (pl * 0.5) + 2; j++) {
    for (let i = -2; i < w / (pl * 0.5) + 2; i++) {
      const cx = i * pl * 0.5;
      const cy = j * pl * 0.5 + (i % 2 ? pl * 0.25 : -pl * 0.25);
      const shade = 38 + Math.random() * 26;
      g.save();
      g.translate(cx, cy);
      g.rotate(i % 2 ? Math.PI / 4 : -Math.PI / 4);
      g.fillStyle = `rgb(${shade + 16},${(shade * 0.84) | 0},${(shade * 0.58) | 0})`;
      g.fillRect(-pl / 2, -pw / 2, pl, pw);
      g.strokeStyle = 'rgba(0,0,0,0.55)'; g.lineWidth = 1.5 * S;
      g.strokeRect(-pl / 2, -pw / 2, pl, pw);
      for (let k = 0; k < 5; k++) {                       // grain along the block
        g.strokeStyle = `rgba(0,0,0,${0.05 + Math.random() * 0.08})`;
        g.lineWidth = S;
        const gy = -pw / 2 + Math.random() * pw;
        g.beginPath(); g.moveTo(-pl / 2, gy);
        g.lineTo(pl / 2, gy + (Math.random() - 0.5) * 4 * S);
        g.stroke();
      }
      g.restore();
    }
  }
  for (let i = 0; i < 24; i++) {                          // worn sheen patches
    const x = Math.random() * w, y = Math.random() * h, r = (50 + Math.random() * 120) * S;
    const sg = g.createRadialGradient(x, y, r * 0.2, x, y, r);
    sg.addColorStop(0, Math.random() < 0.5 ? 'rgba(255,235,200,0.05)' : 'rgba(0,0,0,0.12)');
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = sg; g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
  }
  for (let i = 0; i < 140 * S * S; i++) {                 // scuffs
    g.fillStyle = `rgba(0,0,0,${Math.random() * 0.1})`;
    g.beginPath();
    g.arc(Math.random() * w, Math.random() * h, (1 + Math.random() * 6) * S, 0, 7);
    g.fill();
  }
});

const ceilingTex = makeTexture(256, 256, (g, w, h) => {
  g.fillStyle = '#1e1c19'; g.fillRect(0, 0, w, h);
  for (let i = 0; i < 160; i++) {
    g.fillStyle = `rgba(60,50,34,${Math.random() * 0.12})`;
    g.beginPath();
    g.arc(Math.random() * w, Math.random() * h, 8 + Math.random() * 36, 0, 7);
    g.fill();
  }
});

const doorTex = makeTexture(512, 1024, (g, w, h) => {
  const S = w / 256;
  g.fillStyle = '#c9c4b4'; g.fillRect(0, 0, w, h);        // old white paint
  for (let i = 0; i < 200 * S; i++) {                     // brush texture
    g.strokeStyle = `rgba(${Math.random() < 0.5 ? '255,253,244' : '150,146,130'},${0.04 + Math.random() * 0.06})`;
    g.lineWidth = (1 + Math.random()) * S;
    const x = Math.random() * w;
    g.beginPath(); g.moveTo(x, 0); g.lineTo(x + (Math.random() - 0.5) * 8 * S, h); g.stroke();
  }
  function panel(px, py, pw2, ph2) {                      // bevelled recessed panel
    g.strokeStyle = 'rgba(70,66,56,0.55)'; g.lineWidth = 3 * S;
    g.strokeRect(px, py, pw2, ph2);
    g.strokeStyle = 'rgba(255,255,248,0.5)'; g.lineWidth = 2 * S;
    g.strokeRect(px + 4 * S, py + 4 * S, pw2 - 8 * S, ph2 - 8 * S);
    g.fillStyle = 'rgba(60,56,46,0.10)';
    g.fillRect(px + 6 * S, py + 6 * S, pw2 - 12 * S, ph2 - 12 * S);
  }
  panel(30 * S, 36 * S, w - 60 * S, h / 2 - 70 * S);
  panel(30 * S, h / 2 + 16 * S, w - 60 * S, h / 2 - 70 * S);
  for (let i = 0; i < 120 * S * S; i++) {                 // handling grime
    g.fillStyle = `rgba(60,55,42,${Math.random() * 0.08})`;
    g.beginPath();
    g.arc(Math.random() * w, Math.random() * h, (2 + Math.random() * 9) * S, 0, 7);
    g.fill();
  }
  const eg = g.createLinearGradient(0, h * 0.86, 0, h);   // kicked-up bottom edge
  eg.addColorStop(0, 'rgba(50,46,36,0)'); eg.addColorStop(1, 'rgba(50,46,36,0.35)');
  g.fillStyle = eg; g.fillRect(0, 0, w, h);
});

/* the basement pocket — near-black damp concrete with long cracks */
const concreteTex = makeTexture(1024, 1024, (g, w, h) => {
  const S = w / 512;
  g.fillStyle = '#2a2c2e'; g.fillRect(0, 0, w, h);         // cold grey-blue base
  for (let i = 0; i < 1100 * S; i++) {                     // heavy mottling
    g.fillStyle = Math.random() < 0.5
      ? `rgba(20,21,23,${0.04 + Math.random() * 0.08})`
      : `rgba(58,61,64,${0.03 + Math.random() * 0.06})`;
    g.beginPath();
    g.ellipse(Math.random() * w, Math.random() * h,
      (6 + Math.random() * 34) * S, (5 + Math.random() * 24) * S,
      Math.random() * 3, 0, 7);
    g.fill();
  }
  for (let i = 0; i < 9; i++) {                            // large damp radial stains
    const x = Math.random() * w, y = Math.random() * h, r = (60 + Math.random() * 130) * S;
    const sg = g.createRadialGradient(x, y, r * 0.15, x, y, r);
    sg.addColorStop(0, 'rgba(8,9,11,0.22)'); sg.addColorStop(1, 'rgba(8,9,11,0)');
    g.fillStyle = sg; g.beginPath(); g.arc(x, y, r, 0, 7); g.fill();
  }
  /* a few long jagged cracks with small branches */
  function crack(x, y, ang, len, depth) {
    if (depth > 3) return;
    g.strokeStyle = `rgba(150,152,156,${0.10 + Math.random() * 0.08})`;
    g.lineWidth = (0.6 + Math.random()) * S;
    let cx = x, cy = y, a = ang;
    g.beginPath(); g.moveTo(cx, cy);
    const steps = 18 + Math.random() * 22;
    for (let s = 0; s < steps; s++) {
      a += (Math.random() - 0.5) * 0.6;
      cx += Math.cos(a) * (len / steps);
      cy += Math.sin(a) * (len / steps);
      g.lineTo(cx, cy);
      if (Math.random() < 0.08) crack(cx, cy, a + (Math.random() - 0.5) * 1.6, len * 0.35, depth + 2);
    }
    g.stroke();
  }
  crack(w * 0.2, -10, 1.4, h * 1.1, 0);
  crack(w * 0.7, h * 0.1, 1.9, h * 0.9, 0);
  crack(-10, h * 0.45, 0.3, w * 1.0, 1);
  for (let i = 0; i < 320 * S * S; i++) {                  // speckle
    g.fillStyle = `rgba(${Math.random() < 0.5 ? '10,10,12' : '120,122,126'},${Math.random() * 0.05})`;
    g.fillRect(Math.random() * w, Math.random() * h, 2, 2);
  }
});

/* the dark door — 4-panel near-black wood, non-tiling so a gradient is safe */
const darkDoorTex = makeTexture(512, 1024, (g, w, h) => {
  const S = w / 256;
  g.fillStyle = '#1a1410'; g.fillRect(0, 0, w, h);         // very dark base
  for (let i = 0; i < 180 * S; i++) {                      // subtle vertical grain
    g.strokeStyle = `rgba(${Math.random() < 0.5 ? '40,32,24' : '8,6,4'},${0.05 + Math.random() * 0.08})`;
    g.lineWidth = (0.6 + Math.random()) * S;
    const x = Math.random() * w;
    g.beginPath(); g.moveTo(x, 0); g.lineTo(x + (Math.random() - 0.5) * 6 * S, h); g.stroke();
  }
  function panel(px, py, pw2, ph2) {                       // bevelled recessed panel
    g.strokeStyle = 'rgba(0,0,0,0.7)'; g.lineWidth = 4 * S;
    g.strokeRect(px, py, pw2, ph2);
    g.strokeStyle = 'rgba(255,255,255,0.08)'; g.lineWidth = 2 * S;
    g.strokeRect(px + 5 * S, py + 5 * S, pw2 - 10 * S, ph2 - 10 * S);
  }
  const colW = (w - 30 * S) / 2, rowH = (h - 36 * S) / 2;
  panel(10 * S, 12 * S, colW - 5 * S, rowH - 18 * S);
  panel(20 * S + colW, 12 * S, colW - 5 * S, rowH - 18 * S);
  panel(10 * S, rowH + 24 * S, colW - 5 * S, rowH - 18 * S);
  panel(20 * S + colW, rowH + 24 * S, colW - 5 * S, rowH - 18 * S);
  for (let i = 0; i < 60 * S; i++) {                       // worn lighter edges near the lock
    g.fillStyle = `rgba(120,104,82,${Math.random() * 0.10})`;
    g.beginPath();
    g.arc(w * 0.86 + (Math.random() - 0.5) * 40 * S, h * 0.5 + (Math.random() - 0.5) * 90 * S,
      (1 + Math.random() * 5) * S, 0, 7);
    g.fill();
  }
  const eg = g.createLinearGradient(0, h * 0.78, 0, h);    // grime bottom gradient
  eg.addColorStop(0, 'rgba(0,0,0,0)'); eg.addColorStop(1, 'rgba(0,0,0,0.55)');
  g.fillStyle = eg; g.fillRect(0, 0, w, h);
});

/* an old painted portrait — the sitter has a face, and the face has had enough */
function portraitTexture() {
  return makeTexture(160, 200, (g, w, h) => {
    const grad = g.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#332f25'); grad.addColorStop(1, '#100e0a');
    g.fillStyle = grad; g.fillRect(0, 0, w, h);
    const cx = w / 2, cy = h * 0.42;
    g.fillStyle = '#16120c';                              // dark coat, high shoulders
    g.beginPath(); g.ellipse(cx, h * 1.02, w * 0.46, h * 0.48, 0, Math.PI, 0); g.fill();
    g.fillStyle = '#d6cbb2';                              // collar
    g.beginPath(); g.moveTo(cx - 13, h * 0.62); g.lineTo(cx, h * 0.7); g.lineTo(cx + 13, h * 0.62);
    g.lineTo(cx + 8, h * 0.56); g.lineTo(cx - 8, h * 0.56); g.fill();
    g.fillStyle = '#b9a784';                              // the face
    g.beginPath(); g.ellipse(cx, cy, w * 0.18, h * 0.17, 0, 0, 7); g.fill();
    g.fillStyle = '#191309';                              // severe combed hair
    g.beginPath(); g.ellipse(cx, cy - h * 0.115, w * 0.2, h * 0.085, 0, Math.PI, 0, true); g.fill();
    g.fillStyle = 'rgba(90,74,52,0.5)';                   // sunken sockets
    g.beginPath(); g.ellipse(cx - 11, cy - 4, 7, 5, 0, 0, 7); g.fill();
    g.beginPath(); g.ellipse(cx + 11, cy - 4, 7, 5, 0, 0, 7); g.fill();
    g.fillStyle = '#0c0905';                              // eyes — one fractionally off
    g.beginPath(); g.ellipse(cx - 11, cy - 4, 2.6, 3.2, 0, 0, 7); g.fill();
    g.beginPath(); g.ellipse(cx + 11.8, cy - 3.4, 2.6, 3.2, 0, 0, 7); g.fill();
    g.fillStyle = 'rgba(255,250,235,0.65)';
    g.fillRect(cx - 11.8, cy - 5.6, 1.2, 1.2); g.fillRect(cx + 11, cy - 5, 1.2, 1.2);
    g.strokeStyle = 'rgba(80,60,40,0.8)'; g.lineWidth = 1.2;
    g.beginPath(); g.moveTo(cx, cy + 2); g.lineTo(cx - 1.5, cy + 9); g.stroke();   // nose
    g.strokeStyle = '#241a10'; g.lineWidth = 1.8;
    g.beginPath(); g.moveTo(cx - 7, cy + 16); g.lineTo(cx + 7, cy + 15); g.stroke(); // a flat line of a mouth
    for (let i = 0; i < 60; i++) {                        // craquelure
      g.strokeStyle = `rgba(0,0,0,${0.06 + Math.random() * 0.1})`;
      g.lineWidth = 0.6;
      const x0 = Math.random() * w, y0 = Math.random() * h;
      g.beginPath(); g.moveTo(x0, y0);
      g.lineTo(x0 + (Math.random() - 0.5) * 18, y0 + (Math.random() - 0.5) * 18);
      g.stroke();
    }
    const vg = g.createRadialGradient(cx, h * 0.45, h * 0.25, cx, h * 0.45, h * 0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(8,6,3,0.55)');
    g.fillStyle = vg; g.fillRect(0, 0, w, h);
  });
}

const scrawlTex = makeTexture(512, 128, (g, w, h) => {
  g.clearRect(0, 0, w, h);
  g.strokeStyle = 'rgba(28,24,18,0.65)'; g.lineWidth = 1.6;
  let x = 14;                                             // illegible handwriting
  for (let word = 0; word < 7 && x < w - 30; word++) {
    const y = h / 2 + (Math.random() - 0.5) * 16;
    g.beginPath(); g.moveTo(x, y);
    const wlen = 30 + Math.random() * 50;
    for (let s = 0; s < wlen; s += 5) {
      g.quadraticCurveTo(
        x + s + 2, y - 5 - Math.random() * 9,
        x + s + 5, y + (Math.random() - 0.5) * 7);
    }
    g.stroke(); x += wlen + 14;
  }
});

const wallTextTex = makeTexture(512, 256, (g, w, h) => {
  g.clearRect(0, 0, w, h);
  g.fillStyle = 'rgba(110,8,8,0.92)';
  g.font = 'bold 64px Georgia';
  g.textAlign = 'center';
  const word = 'FORGIVE ME';

const solids = [];

function addSolid(minX, maxX, minZ, maxZ) {
  const s = { minX, maxX, minZ, maxZ, disabled: false };
  solids.push(s); return s;
}
const PLAYER_R = 0.3;
function collides(x, z) {
  for (const s of solids) {
    if (s.disabled) continue;
    if (x > s.minX - PLAYER_R && x < s.maxX + PLAYER_R &&
        z > s.minZ - PLAYER_R && z < s.maxZ + PLAYER_R) return true;
  }
  return false;
}

function addBox(w, h, d, x, y, z, mat, opts = {}) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  m.castShadow = opts.cast ?? false;
  m.receiveShadow = opts.receive ?? true;
  scene.add(m);
  if (opts.solid) addSolid(x - w / 2, x + w / 2, z - d / 2, z + d / 2);
  return m;
}
function addFlat(w, d, x, y, z, mat, flip) {
  const m = new THREE.Mesh(new THREE.PlaneGeometry(w, d), mat);
  m.rotation.x = flip ? Math.PI / 2 : -Math.PI / 2;
  m.position.set(x, y, z);
  m.receiveShadow = true;

}

function landscapeTexture() {
  return makeTexture(200, 150, (g, w, h) => {
    const sky = g.createLinearGradient(0, 0, 0, h * 0.7);
    sky.addColorStop(0, '#1c2026'); sky.addColorStop(1, '#0d0f0c');
    g.fillStyle = sky; g.fillRect(0, 0, w, h);
    g.fillStyle = 'rgba(190,195,185,0.18)';               // smudged moon
    g.beginPath(); g.arc(w * 0.7, h * 0.25, 9, 0, 7); g.fill();
    g.fillStyle = '#070806';                              // hills
    g.beginPath(); g.moveTo(0, h * 0.62);
    g.bezierCurveTo(w * 0.3, h * 0.5, w * 0.55, h * 0.72, w, h * 0.55);
    g.lineTo(w, h); g.lineTo(0, h); g.fill();
    for (let i = 0; i < 120; i++) {
      g.fillStyle = `rgba(0,0,0,${Math.random() * 0.2})`;
      g.fillRect(Math.random() * w, Math.random() * h, 2, 2);
    }
  });
}

function familyPhotoTexture(scratched) {

    g.fillStyle = bg; g.fillRect(10, 10, w - 20, h - 20);

/* a bare tree on a hill, and three birds leaving */
function paintingTreeTexture() {
  return makeTexture(160, 220, (g, w, h) => {

    for (const [bx, by] of [[w * 0.7, h * 0.2], [w * 0.78, h * 0.16], [w * 0.74, h * 0.26]]) {

/* a real print: aged, dimmed, occasionally defaced */
function photoTexture(file, scratch) {
  const c = document.createElement('canvas');
  c.width = c.height = 4;
  const g0 = c.getContext('2d');
  g0.fillStyle = '#171410'; g0.fillRect(0, 0, 4, 4);     // dark until the print loads
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = MAX_ANISO;
  const img = new Image();
  img.onload = () => {
    c.width = img.width; c.height = img.height;
    const g = c.getContext('2d');
    g.filter = 'saturate(0.6) brightness(0.85) contrast(0.95)';
    g.drawImage(img, 0, 0);
    g.filter = 'none';
    if (scratch) {                                        // someone took something sharp to it
      const cx = scratch.x * c.width, cy = scratch.y * c.height, rad = scratch.r * c.height;
      for (let i = 0; i < 34; i++) {
        const a = Math.random() * Math.PI - Math.PI / 2;
        const lx = (Math.random() - 0.5) * rad * 0.9, ly = (Math.random() - 0.5) * rad * 0.9;
        const len = rad * (0.8 + Math.random() * 0.9);
        g.strokeStyle = Math.random() < 0.75
          ? `rgba(236,229,212,${0.55 + Math.random() * 0.4})`
          : `rgba(30,24,16,${0.5 + Math.random() * 0.4})`;
        g.lineWidth = 1 + Math.random() * 2.5;
        g.beginPath();
        g.moveTo(cx + lx - Math.cos(a) * len / 2, cy + ly - Math.sin(a) * len / 2);
        g.lineTo(cx + lx + Math.cos(a) * len / 2, cy + ly + Math.sin(a) * len / 2);
        g.stroke();
      }
    }
    const vg = g.createRadialGradient(c.width / 2, c.height / 2, c.height * 0.35,
                                      c.width / 2, c.height / 2, c.width * 0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(20,14,8,0.4)');
    g.fillStyle = vg; g.fillRect(0, 0, c.width, c.height);
    t.dispose();          // GPU storage is immutable — force a fresh allocation at the new size
    t.needsUpdate = true;
  };
  img.src = './photos/' + encodeURIComponent(file);
  return t;
}

/* Turn the zombie into Lisa: bleach the textures to a pale spectre,
   keep the hair dark, and dress her in a stained floor-length nightgown. */
const lisaGhostMats = [];   // her body materials, for ramping opacity during the lunge
const LISA_BASE_OPACITY = 0.55;
function setLisaOpacity(o) { for (const m of lisaGhostMats) m.opacity = o; }

function ghostifyMaterial(m) {
  /* the hair cards are the only originally-transparent materials — delete them.
     she has no hair now. a bald, wet skull reads far worse. */
  if (m.transparent || /hair/i.test(m.name || '')) {
    m.opacity = 0;
    m.colorWrite = false;
    m.depthWrite = false;
    m.needsUpdate = true;
    return;
  }
  /* bleach the body to a cold corpse-pale, then make her a translucent apparition */
  if (m.map && m.map.image) {
    const img = m.map.image;
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    const g = c.getContext('2d');
    g.filter = 'saturate(0.07) brightness(1.7) contrast(0.82)';
    g.drawImage(img, 0, 0);
    g.filter = 'none';
    g.fillStyle = 'rgba(202,214,224,0.24)';               // cold spectral wash
    g.fillRect(0, 0, c.width, c.height);
    const t = new THREE.CanvasTexture(c);
    t.colorSpace = m.map.colorSpace;
    t.flipY = m.map.flipY;
    t.wrapS = m.map.wrapS; t.wrapT = m.map.wrapT;
    m.map = t;
  }
  if (m.color) m.color.set(0xdfe8ee);                      // cold blue-white
  if (m.emissive) m.emissive.set(0x33404a);               // faint inner glow, so she reads in the dark
  if ('emissiveIntensity' in m) m.emissiveIntensity = 0.55;
  if ('shininess' in m) m.shininess = 8;
  m.transparent = true;
  m.opacity = LISA_BASE_OPACITY;
  m.depthWrite = false;                                    // see through her own body — ethereal
  m.needsUpdate = true;
  lisaGhostMats.push(m);
}

/* FBXLoader assigns texture images asynchronously — wait until the maps are
   actually decoded before bleaching them */
function ghostifyWhenReady(char) {
  const mats = new Set();
  char.traverse(o => {
    if (o.isMesh) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => mats.add(m));
  });
  let tries = 0;
  const timer = setInterval(() => {
    tries++;
    const ready = [...mats].every(m => !m.map || (m.map.image && m.map.image.width > 0));
    if ((ready && tries > 2) || tries > 25) {
      clearInterval(timer);
      mats.forEach(ghostifyMaterial);
    }
  }, 200);
}

const fbxLoader = new FBXLoader();
(async () => {
  const char = await fbxLoader.loadAsync('./zombie-pack/' + encodeURIComponent('Zombiegirl W Kurniawan.fbx'));
  /* Mixamo exports in cm; normalise her height to ~1.9m */
  const size = new THREE.Box3().setFromObject(char).getSize(new THREE.Vector3());
  char.scale.setScalar(1.9 / size.y);
  char.traverse(o => {
    if (o.isMesh) {
      o.castShadow = false;             // a ghost throws no shadow
      o.frustumCulled = false;          // skinned bounds lie; never let her vanish
    }
  });
  ghostifyWhenReady(char);              // bleach the body, delete the hair cards, make her translucent
  lisa.add(char);
  lisaMixer = new THREE.AnimationMixer(char);
  const wanted = { idle: 'zombie idle', scream: 'zombie scream', walk: 'zombie walk' };
  for (const [key, file] of Object.entries(wanted)) {
    const anim = await fbxLoader.loadAsync('./zombie-pack/' + encodeURIComponent(file + '.fbx'));
    const clip = anim.animations[0];
    /* strip root translation (game code owns her position) and scale tracks
       (so the collapsed legs stay collapsed) */
    clip.tracks = clip.tracks.filter(t => !t.name.endsWith('Hips.position'));
    lisaActions[key] = lisaMixer.clipAction(clip);
  }
  lisaActions.scream.timeScale = 1.5;   // the lunge window is short
  playLisa('idle');
})().catch(e => console.error('Lisa failed to load:', e));

function noiseSource() {

/* connect a node to the master bus with a reverb send */
function route(node, wet = 0.25) {
  node.connect(master);

    node.connect(g); g.connect(verb);

}

const SOUNDS = { scream: 'dragon-studio-scary-scream-401725.mp3' };
const samples = {};
async function loadSamples() {
  for (const [name, file] of Object.entries(SOUNDS)) {
    try {
      const arr = await (await fetch('./sounds/' + encodeURIComponent(file))).arrayBuffer();
      samples[name] = await AC.decodeAudioData(arr);

}
function playSample(buf, { gain = 1, rate = 1, wet = 0.35, fade = 0 } = {}) {
  if (!AC || !buf) return null;
  const t = AC.currentTime;
  const src = AC.createBufferSource();
  src.buffer = buf; src.playbackRate.value = rate;
  const g = AC.createGain(); g.gain.value = gain;
  if (fade > 0) {                              // let it ring, then bow out before the tail drags
    g.gain.setValueAtTime(gain, t + fade);
    g.gain.exponentialRampToValueAtTime(0.001, t + fade + 0.6);
  }
  src.connect(g); route(g, wet);
  src.start(t);
  return src;
}

function initAudio() {
  if (AC) { AC.resume(); return; }
  AC = new (window.AudioContext || window.webkitAudioContext)();
  loadSamples();
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -18; comp.ratio.value = 8;
  comp.connect(AC.destination);
  master = AC.createGain(); master.gain.value = 0.85;
  master.connect(comp);

  noiseBuf = AC.createBuffer(1, AC.sampleRate * 2, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

  /* convolution reverb — a procedurally generated decaying-noise impulse */
  const irLen = (AC.sampleRate * 1.8) | 0;
  const ir = AC.createBuffer(2, irLen, AC.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const cd = ir.getChannelData(ch);
    let lp = 0;
    for (let i = 0; i < irLen; i++) {
      const decay = Math.pow(1 - i / irLen, 2.6);
      lp += 0.25 * ((Math.random() * 2 - 1) - lp);        // darken the tail
      cd[i] = lp * decay;
    }
  }
  verb = AC.createConvolver(); verb.buffer = ir;
  const verbGain = AC.createGain(); verbGain.gain.value = 0.5;
  verb.connect(verbGain); verbGain.connect(master);

  /* low drone — detuned cluster through a dark filter */
  const droneGain = AC.createGain(); droneGain.gain.value = 0.045;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 160;
  lp.connect(droneGain); route(droneGain, 0.6);
  for (const f of [48, 48.6, 72.2]) {
    const o = AC.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
    const og = AC.createGain(); og.gain.value = f > 60 ? 0.4 : 1;
    o.connect(og); og.connect(lp); o.start();
  }
  const lfo = AC.createOscillator(); lfo.frequency.value = 0.07;
  const lfoG = AC.createGain(); lfoG.gain.value = 0.016;
  lfo.connect(lfoG); lfoG.connect(droneGain.gain); lfo.start();

  /* room tone */
  const hiss = noiseSource();
  const hlp = AC.createBiquadFilter(); hlp.type = 'lowpass'; hlp.frequency.value = 380;
  const hg = AC.createGain(); hg.gain.value = 0.012;
  hiss.connect(hlp); hlp.connect(hg); route(hg, 0.3); hiss.start();

  /* riser — gain driven per-frame on approach */
  const rn = noiseSource();
  const rbp = AC.createBiquadFilter(); rbp.type = 'bandpass';
  rbp.frequency.value = 900; rbp.Q.value = 1.2;
  riserGain = AC.createGain(); riserGain.gain.value = 0;
  rn.connect(rbp); rbp.connect(riserGain); route(riserGain, 0.4); rn.start();

  /* fluorescent hum near the dark door — two mains-ish tones, driven by proximity */
  humGain = AC.createGain(); humGain.gain.value = 0;
  for (const [f, gv] of [[100, 0.5], [120, 0.25]]) {
    const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const og = AC.createGain(); og.gain.value = gv;
    o.connect(og); og.connect(humGain); o.start();
  }
  route(humGain, 0.3);

  /* the dead radio murmurs, if you stand close enough to hear it */
  murGain = AC.createGain(); murGain.gain.value = 0;
  const mur = noiseSource();
  const mf1 = AC.createBiquadFilter(); mf1.type = 'bandpass'; mf1.frequency.value = 520; mf1.Q.value = 4;
  const mf2 = AC.createBiquadFilter(); mf2.type = 'bandpass'; mf2.frequency.value = 1350; mf2.Q.value = 5;
  const am = AC.createGain(); am.gain.value = 0.5;        // syllable-rate amplitude wobble
  const syl = AC.createOscillator(); syl.frequency.value = 3.3;
  const sylG = AC.createGain(); sylG.gain.value = 0.45;
  syl.connect(sylG); sylG.connect(am.gain); syl.start();
  const wander = AC.createOscillator(); wander.frequency.value = 0.31;  // vowels drifting
  const wanderG = AC.createGain(); wanderG.gain.value = 180;
  wander.connect(wanderG); wanderG.connect(mf2.frequency); wander.start();
  mur.connect(mf1); mur.connect(mf2);
  mf1.connect(am); mf2.connect(am);
  am.connect(murGain);
  route(murGain, 0.25);
  mur.start();
}

function footstep() {
  if (!AC) return;
  const t = AC.currentTime;
  const heel = noiseSource();
  const hf = AC.createBiquadFilter(); hf.type = 'lowpass';
  hf.frequency.value = 170 + Math.random() * 60;
  const hg = AC.createGain();
  hg.gain.setValueAtTime(0.2 + Math.random() * 0.06, t);
  hg.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
  heel.connect(hf); hf.connect(hg); route(hg, 0.35);
  heel.start(t); heel.stop(t + 0.1);
  const toe = noiseSource();                              // toe lands ~70ms later
  const tf = AC.createBiquadFilter(); tf.type = 'lowpass';
  tf.frequency.value = 320 + Math.random() * 120;
  const tg = AC.createGain();
  tg.gain.setValueAtTime(0.0001, t);
  tg.gain.setValueAtTime(0.09 + Math.random() * 0.04, t + 0.07);
  tg.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
  toe.connect(tf); tf.connect(tg); route(tg, 0.35);
  toe.start(t); toe.stop(t + 0.15);
  const o = AC.createOscillator();                        // wood body resonance
  o.frequency.value = 95 + Math.random() * 30;
  const og = AC.createGain();
  og.gain.setValueAtTime(0.06, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  o.connect(og); route(og, 0.3); o.start(t); o.stop(t + 0.14);
}

  const t = AC.currentTime;
  const o = AC.createOscillator(); o.type = 'triangle';

  o.frequency.linearRampToValueAtTime(285, t + 1.5);

  const bp = AC.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 580; bp.Q.value = 2.2;
  const g = AC.createGain(); g.gain.value = 0.0001;

    g.gain.setTargetAtTime(0.022 - k * 0.003, t + k * 0.3, 0.05);

function scareSting() {
  if (!AC) return;
  const t = AC.currentTime;
  /* shrieking noise sweep */
  const n = noiseSource();
  const bp = AC.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 0.8;
  bp.frequency.setValueAtTime(3200, t);
  bp.frequency.exponentialRampToValueAtTime(260, t + 1.3);
  const ng = AC.createGain();
  ng.gain.setValueAtTime(0.85, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 1.4);
  n.connect(bp); bp.connect(ng); route(ng, 0.5); n.start(t); n.stop(t + 1.5);
  /* the scream — a real recorded voice if loaded, else the synth fallback */
  if (samples.scream) {
    playSample(samples.scream, { gain: 1.15, rate: 0.94, wet: 0.4, fade: 1.9 });
  } else {
    const sc = AC.createOscillator(); sc.type = 'sawtooth';
    sc.frequency.setValueAtTime(520, t);
    sc.frequency.linearRampToValueAtTime(880, t + 0.18);
    sc.frequency.exponentialRampToValueAtTime(310, t + 1.0);
    const fm = AC.createOscillator(); fm.frequency.value = 28;
    const fmg = AC.createGain(); fmg.gain.value = 60;
    fm.connect(fmg); fmg.connect(sc.frequency); fm.start(t); fm.stop(t + 1.1);
    const form = AC.createBiquadFilter(); form.type = 'bandpass';
    form.frequency.value = 950; form.Q.value = 1.4;
    const sg = AC.createGain();
    sg.gain.setValueAtTime(0.001, t);
    sg.gain.exponentialRampToValueAtTime(0.34, t + 0.05);
    sg.gain.exponentialRampToValueAtTime(0.001, t + 1.05);
    sc.connect(form); form.connect(sg); route(sg, 0.55);
    sc.start(t); sc.stop(t + 1.1);
  }
  /* dissonant cluster pitching down */
  for (const f of [185, 233, 311, 466]) {
    const o = AC.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(f * (1 + Math.random() * 0.04), t);
    o.frequency.exponentialRampToValueAtTime(f * 0.45, t + 1.2);
    const g = AC.createGain();
    g.gain.setValueAtTime(0.13, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 1.25);
    o.connect(g); route(g, 0.4); o.start(t); o.stop(t + 1.3);
  }
  /* sub punch */
  const s = AC.createOscillator(); s.frequency.setValueAtTime(62, t);
  s.frequency.exponentialRampToValueAtTime(26, t + 0.5);
  const subg = AC.createGain();
  subg.gain.setValueAtTime(0.95, t);
  subg.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  s.connect(subg); route(subg, 0.15); s.start(t); s.stop(t + 0.65);
}

/* ============================ PLAYER / CONTROLS ============================ */

let px = 0, pz = -0.6, yaw = 0, pitch = 0;
let locked = false, bobPhase = 0, stepDist = 0;
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; });
addEventListener('keyup',   e => { keys[e.code] = false; });

const overlay = document.getElementById('overlay');
const crosshair = document.getElementById('crosshair');
overlay.addEventListener('click', () => {
  initAudio();
  renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
  locked = document.pointerLockElement === renderer.domElement;
  overlay.classList.toggle('hidden', locked);
  crosshair.style.display = locked ? 'block' : 'none';
});
addEventListener('mousemove', e => {
  if (!locked) return;
  yaw   -= e.movementX * 0.0021;
  pitch -= e.movementY * 0.0021;
  pitch = Math.max(-1.45, Math.min(1.45, pitch));
});

const SPEED = 1.55;  // a reluctant walk. no sprint. on purpose.
function updatePlayer(dt) {
  const f = (keys.KeyW || keys.ArrowUp ? 1 : 0) - (keys.KeyS || keys.ArrowDown ? 1 : 0);
  const r = (keys.KeyD || keys.ArrowRight ? 1 : 0) - (keys.KeyA || keys.ArrowLeft ? 1 : 0);
  let dx = -Math.sin(yaw) * f + Math.cos(yaw) * r;
  let dz = -Math.cos(yaw) * f - Math.sin(yaw) * r;
  const len = Math.hypot(dx, dz);
  if (len > 0.001) {
    dx = dx / len * SPEED * dt;
    dz = dz / len * SPEED * dt;
    if (!collides(px + dx, pz)) px += dx;
    if (!collides(px, pz + dz)) pz += dz;
    bobPhase += SPEED * dt * 5.2;
    stepDist += Math.hypot(dx, dz);
    if (stepDist > 0.72) { stepDist = 0; footstep(); }
  }
  px = Math.max(-16.0, Math.min(1.45, px));
  pz = Math.max(-18.45, Math.min(-0.2, pz));
}

/* ============================ DOOR LOGIC ============================ */

function updateDoor(dt, now) {
  if (doorState === 'closed' && px < -7.5) {
    doorState = 'opening';
    doorTarget = -1.85;                 // swings open into the room (toward -x)
    doorCreak();
  }
  if (doorState === 'slammed' && now > doorRearmAt) doorState = 'closed';
  const diff = doorTarget - doorAngle;
  if (Math.abs(diff) > 0.002) {
    const rate = doorState === 'slamming' ? 14 : 0.55;
    doorAngle += Math.sign(diff) * Math.min(Math.abs(diff), rate * dt);
    doorHinge.rotation.y = doorAngle;
    if (doorState === 'slamming' && Math.abs(doorTarget - doorAngle) < 0.01) {
      doorState = 'slammed';
      doorRearmAt = now + 6;
    }
  }
  doorSolid.disabled = Math.abs(doorAngle) > 1.1;
}

/* ============================ LIGHTS / FLICKER ============================ */

let dimFactor = 1, scareBlackout = false;
function updateLights(now, dt) {
  for (const L of lamps) {
    if (now > L.nextPick) {
      L.nextPick = now + 0.06 + Math.random() * 0.08;
      L.target = L.base * (0.72 + Math.random() * 0.42);
      if (L.fluoro) {                                    // nastier rapid fluorescent stutter
        if (Math.random() < 0.03) L.dropUntil = now + 0.03 + Math.random() * 0.12;
      } else if (Math.random() < 0.006) {
        L.dropUntil = now + 0.05 + Math.random() * 0.3;
      }
    }
    let tgt = (now < L.dropUntil) ? L.base * 0.04 : L.target;
    if (scareBlackout) tgt = 0;
    L.cur += (tgt - L.cur) * Math.min(1, dt * 22);
    L.light.intensity = L.cur * dimFactor;
    const emisBase = L.fluoro ? L.fluoroEmis : 2.2;
    L.bulbMat.emissiveIntensity = (L.cur / L.base) * emisBase * dimFactor;
    if (L.swing) L.group.rotation.z = Math.sin(now * 0.9) * L.swing;
  }
}

/* ============================ THE TEASE ============================
   First time you get halfway down the hall: the far lamp browns out and
   she is simply there, in front of the door. Then she isn't.            */

let teaseState = 'armed', teaseT = 0;
const teaseZ = -15.25;
function updateTease(dt, now) {
  if (teaseState === 'armed' && pz < -14.2 && lisaActions.idle) {
    teaseState = 'running'; teaseT = 0;
    lisa.position.set(-8.9, 0, teaseZ);
    lisa.lookAt(px, 0, pz);
    lisa.visible = true;
    setLisaOpacity(0.26);                  // barely there at the corner — a glimpse, not a figure
    playLisa('idle');
    /* kill the sconce but leave the fluorescent stuttering —
       she is only ever glimpsed in the flashes */
    sconceB.dropUntil = now + 0.9;
    lampFluoro.dropUntil = now + 0.12;
    subThump(); whisper();
  }
  if (teaseState !== 'running') return;
  teaseT += dt;
  /* jitter perpendicular to the view down leg B — along z */
  lisa.position.z = teaseZ + Math.sin(teaseT * 31) * 0.012;   // barely-there shudder
  if (teaseT > 0.7 && teaseT < 0.85) lampFluoro.dropUntil = now + 0.3;  // one long blink…
  if (teaseT > 0.85) {
    lisa.visible = false;                                               // …and she's gone
    teaseState = 'done';
  }
}

/* ============================ THE SCARE ============================ */

let scareState = 'armed';   // armed -> running -> corner -> done
const ROOM_SCARE = false;   // in-room Lisa scare disabled for now (the corner tease stays)
let scareT = 0, shakeAmp = 0, freezeScare = false, twitchAt = 0;
const spawnPos = new THREE.Vector3();

function triggerScare() {
  scareState = 'running';
  scareT = 0;
  scareSting();
  playLisa('scream', 0.03);
  const fx = px - Math.sin(yaw) * 2.3;
  const fz = pz - Math.cos(yaw) * 2.3;
  spawnPos.set(
    Math.max(-15.7, Math.min(-10.6, fx)), 0,
    Math.max(-18.0, Math.min(-12.8, fz)));
}

function updateScare(dt, now) {
  if (ROOM_SCARE && scareState === 'armed' && px < -11.5) triggerScare();

  if (scareState === 'corner') {                          // she waits, facing the wall
    lisa.scale.y = 1 + Math.sin(now * 1.7) * 0.004;       // breathing
    if (Math.hypot(px - lisa.position.x, pz - lisa.position.z) < 1.35) {
      lisa.visible = false;
      scareLight.intensity = 0;
      scareState = 'done';
      whisper(); subThump();
    }
    return;
  }
  if (scareState !== 'running') return;

  scareT += dt;
  if (freezeScare && scareT > 0.5) scareT = 0.5;
  if (scareT < 0.12) {                                    // lights cut
    scareBlackout = true;
    lisa.visible = false;
  } else if (scareT < 0.95) {                             // she is here
    scareBlackout = false;
    lisa.visible = true;
    scareLight.intensity = 3.5 + Math.random() * 2.5;
    const k = (scareT - 0.12) / 0.83;
    const tx = px - Math.sin(yaw) * 0.85;
    const tz = pz - Math.cos(yaw) * 0.85;
    /* jerky, sticking lunge: quantize the approach into snaps */
    const kq = Math.min(1, Math.floor(k * 7) / 7 + (k * k) * 0.25);
    lisa.position.set(
      spawnPos.x + (tx - spawnPos.x) * kq + (Math.random() - 0.5) * 0.05,
      (Math.random() - 0.5) * 0.04,
      spawnPos.z + (tz - spawnPos.z) * kq + (Math.random() - 0.5) * 0.05);
    lisa.lookAt(px, 0, pz);
    setLisaOpacity(0.4 + 0.55 * k);                       // ethereal on approach, near-solid in your face
    shakeAmp = 0.035;                                     // the scream clip does the reaching
  } else if (scareT < 1.55) {                             // blackout again
    scareBlackout = true;
    lisa.visible = false;
    scareLight.intensity = 0;
    shakeAmp = 0.01;
  } else {                                                // aftermath
    scareState = 'corner';
    scareBlackout = false;
    shakeAmp = 0;
    dimFactor = 0.62;
    scareLight.color.set(0x97a5c0);                       // faint cold spill so you can
    scareLight.intensity = 0.55;                          // *just* make her out

    wallText.visible = true;
    doorState = 'slamming';
    doorTarget = -0.08;
    doorSolid.disabled = false;
    doorSlam();
    /* she didn't leave. she's in the corner, facing the wall. */
    setLisaOpacity(LISA_BASE_OPACITY);                    // ethereal again
    playLisa('idle', 0.4);
    lisa.position.set(-15.5, 0, -17.8);
    lisa.lookAt(-16.6, 0, -18.9);
    lisa.visible = true;
  }
}

/* ============================ AMBIENT AUDIO CUES ============================ */

let nextCreakAt = 6, nextSobAt = 9, nextAmbientAt = 18;
function updateAudioCues(now) {
  if (!AC) return;
  if (now > nextCreakAt) {
    houseCreak();
    nextCreakAt = now + 7 + Math.random() * 14;
  }
  /* the house has other noises */
  if (now > nextAmbientAt) {
    const r = Math.random();
    if (r < 0.2) knock();
    else if (r < 0.4) scratchInWalls();
    else if (r < 0.58) distantSteps();
    else if (r < 0.72) breathBehind();
    else if (r < 0.88 && scareState === 'armed') babyCry();
    else lullaby();
    nextAmbientAt = now + 14 + Math.random() * 22;
  }
  /* the radio only speaks to those who lean in */
  if (murGain) {
    const d = Math.hypot(px - 1.05, pz - (-10.1));
    murGain.gain.setTargetAtTime(
      Math.max(0, 1 - d / 2.2) * 0.011, AC.currentTime, 0.3);
  }
  /* sobbing from beyond the door, while still down leg A */
  if (scareState === 'armed' && now > nextSobAt && pz < -2.5 && pz > -13) {
    sob();
    nextSobAt = now + 13 + Math.random() * 18;
  }
  if (riserGain) {
    const a = scareState === 'armed'
      ? Math.max(0, Math.min(1, (-px - 6.5) / 3.0)) * 0.075 : 0;
    riserGain.gain.setTargetAtTime(a, AC.currentTime, 0.2);
  }
  if (scareState === 'armed' && px < -7.0) {
    const depth = Math.max(0, Math.min(1, (-px - 7.0) / 3.5));
    const interval = 0.62 - depth * 0.24;
    if (AC.currentTime > nextBeat) {
      heartThump(beatHeavy);
      beatHeavy = !beatHeavy;
      nextBeat = AC.currentTime + (beatHeavy ? interval : interval * 0.55);
    }
  }
  /* fluorescent hum swells as you near the dark door */
  if (humGain) {
    const dist = Math.hypot(px - (-9.5), pz - (-15.25));
    let amp = Math.max(0, Math.min(1, 1 - dist / 6)) * 0.035;
    if (scareState === 'corner' || scareState === 'done') amp *= 0.5;
    humGain.gain.setTargetAtTime(amp, AC.currentTime, 0.2);
  }
}

/* ============================ THE LOOP ============================
   Walk through the dark door and the house puts you back at the start.
   One extra lap for now: lap 0 loops, lap 1 lets you through to the scare. */

let lap = 0;
const FINAL_LAP = 1;
let loopState = 'none';   // 'none' | 'out' (fading to black) | 'in' (fading back)
let loopT = 0;
const fadeEl = document.getElementById('fade');

function applyLap(n) {
  if (n >= 1) {                                          // the second pass is wrong
    for (const L of lamps) { L.base *= 0.5; L.light.color.set(0x8ea2c4); }
    loopText.visible = true;
    sob();                                               // a cue that something has changed
  }
}

function updateLoop(dt) {
  /* trigger: stepping through the doorway on a non-final lap */
  if (loopState === 'none' && lap < FINAL_LAP && scareState === 'armed' && px < -10.5) {
    loopState = 'out'; loopT = 0;
  }
  if (loopState === 'out') {
    loopT += dt;
    fadeEl.style.opacity = Math.min(1, loopT / 0.3);
    if (loopT >= 0.3) {                                  // at full black: snap home, change the house
      px = 0; pz = -0.6; yaw = 0; pitch = 0;
      lap++; applyLap(lap);
      loopState = 'in'; loopT = 0;
    }
  } else if (loopState === 'in') {
    loopT += dt;
    fadeEl.style.opacity = Math.max(0, 1 - loopT / 0.8);
    if (loopT >= 0.8) { loopState = 'none'; fadeEl.style.opacity = 0; }
  }
}

/* ============================ MAIN LOOP ============================ */

/* hidden debug hook — open the console and try __pt.scare() */
window.__pt = {
  warp: (x, z) => { px = x; pz = z; },
  look: (y, p = 0) => { yaw = y; pitch = p; },
  scare: () => { if (scareState === 'armed') triggerScare(); },
  freeze: v => { freezeScare = v; },
  showLisa: (d = 2.2) => {
    lisa.position.set(px - Math.sin(yaw) * d, 0, pz - Math.cos(yaw) * d);
    lisa.lookAt(px, 0, pz);
    lisa.visible = true;
  },
  hideLisa: () => { lisa.visible = false; },
  step: (dt = 1 / 60, n = 1) => { for (let i = 0; i < n; i++) tick(dt); },
  getLap: () => lap,
  loopState: () => loopState,
  initAudio: () => initAudio(),
  sting: () => scareSting(),
  samples,
  scene, camera, lisa, wallText,
};

let simTime = 0, lastMs = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const nowMs = performance.now();
  tick(Math.min((nowMs - lastMs) / 1000, 0.05));
  lastMs = nowMs;
}
function tick(dt) {
  simTime += dt;
  const now = simTime;

  if (locked) updatePlayer(dt);
  updateLoop(dt);                        // before the scare: a non-final lap loops you home first
  updateDoor(dt, now);
  updateLights(now, dt);
  updateTease(dt, now);
  updateScare(dt, now);
  if (lisaMixer && lisa.visible) lisaMixer.update(dt);
  updateAudioCues(now);

  const bob = Math.sin(bobPhase) * 0.028;
  camera.position.set(
    px + (Math.random() - 0.5) * shakeAmp,
    1.62 + bob + Math.sin(now * 0.55) * 0.008 + (Math.random() - 0.5) * shakeAmp,
    pz + (Math.random() - 0.5) * shakeAmp);
  camera.rotation.x = pitch;
  camera.rotation.y = yaw;
  camera.rotation.z = Math.sin(bobPhase * 0.5) * 0.004 + (Math.random() - 0.5) * shakeAmp * 0.5;

  grimePass.uniforms.time.value = now;
  composer.render();
}
animate();
</script>
